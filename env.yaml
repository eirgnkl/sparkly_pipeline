name: pipeline
channels:
  - conda-forge
  - bioconda
dependencies:
  - cuda
  - cupy
  - jupyterlab
  - matplotlib
  - numpy
  - python=3.12.7=hc5c86c4_0_cpython
  - scanpy=1.10.3=pyhd8ed1ab_0
  - scikit-learn
  - scipy
  - seaborn
  - snakemake=7.30.0=hdfd78af_0
  - snakemake-minimal
  - pip
  - tqdm
  - pip:
      - anndata
      - plotly
      - pooch
      - snakemake-executor-plugin-slurm
      - snakemake-executor-plugin-slurm-jobstep
      - sparse
      - spatial-image
      - spatialdata
      - squidpy
      - utils
      - wadler-lindig
      - xgboost
      - moscot
      # Needed only for the GNN methods (gcn, graphsage). Pure-Python wheel:
      # GCNConv / SAGEConv do NOT require torch-scatter / torch-sparse.
      - torch-geometric==2.7.0

# torch is NOT installed by conda here: install a build matching your CUDA.
# On this HPC (CUDA 12.x) one of the following works; pick the cuXXX that
# matches your driver (e.g. the gnn-env used by the maintainer pins cu121):
#   pip3 install torch --index-url https://download.pytorch.org/whl/cu121
#   pip3 install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu126
# Reference working versions: torch==2.5.1, torch-geometric==2.7.0.
# Without torch + torch_geometric the gcn/graphsage jobs fail loudly (clear
# ImportError); all non-GNN methods still run.
