cluster:
  mkdir -p logs/{rule} && sbatch --partition={resources.partition} {resources.gres} --cpus-per-task={resources.cpus} --mem={resources.mem_mb} --qos={resources.qos} --time={resources.time} --job-name=smk-{rule}-{wildcards} --output=logs/{rule}/%j-{rule}-{wildcards}.out --error=logs/{rule}/%j-{rule}-{wildcards}.err --nice=10000 --exclude=supergpu05,supergpu08,supergpu07,supergpu02,supergpu03 --parsable

default-resources:
  - partition=cpu_p
  - gres=""
  - cpus=8
  - qos=cpu_normal
  - mem_mb=32000
  - disk_mb=40000
  - time='08:00:00'

jobs: 16
keep-going: False
keep-incomplete: False
printshellcmds: True
scheduler: greedy
use-conda: True
cluster-cancel: scancel {cluster_jobid}
show-failed-logs: True
latency-wait: 90
verbose: True
